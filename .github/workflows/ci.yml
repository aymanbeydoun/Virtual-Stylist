name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    name: API typecheck + tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: stylist
          POSTGRES_PASSWORD: stylist
          POSTGRES_DB: virtual_stylist
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run mypy app
      - run: uv run pytest -q
        env:
          DATABASE_URL: postgresql+asyncpg://stylist:stylist@localhost:5432/virtual_stylist
          REDIS_URL: redis://localhost:6379/0

  mobile:
    name: Mobile typecheck + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install
        working-directory: ${{ github.workspace }}
      - run: pnpm typecheck
      - run: pnpm lint
